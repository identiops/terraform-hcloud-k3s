#!/usr/bin/env ansible-playbook
---
- name: Fetch kubeconfig from cluster
  hosts: all_control_plane_nodes[0]
  gather_facts: false
  vars:
    known_hosts_file: "{{ playbook_dir }}/../.ssh/known_hosts"
    clean_known_hosts: "auto"
  tasks:
    - name: Validate required inventory variables
      assert:
        that:
          - cluster_name is defined
          - gateway_ip is defined
          - gateway_firewall_k8s_open is defined
        fail_msg: "Missing required inventory vars. Ensure .ansible/hosts defines cluster_name, gateway_ip, and gateway_firewall_k8s_open in all.vars."

    - name: Check if known_hosts file exists
      stat:
        path: "{{ known_hosts_file }}"
      delegate_to: localhost
      register: known_hosts_stat
      when: clean_known_hosts != 'never'

    - name: Clear known_hosts if requested
      file:
        path: "{{ known_hosts_file }}"
        state: absent
      delegate_to: localhost
      when:
        - clean_known_hosts == 'always'
        - known_hosts_stat.stat.exists | default(false)

    - name: Wait for cluster to be ready
      command: k3s kubectl cluster-info
      register: result
      until: result.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Fetch raw kubeconfig
      command: k3s kubectl config view -ojson --raw
      register: kubeconfig_raw
      changed_when: false

    - name: Decode certificates
      set_fact:
        ca_cert_b64: "{{ (kubeconfig_raw.stdout | from_json).clusters[0].cluster['certificate-authority-data'] }}"
        client_cert_b64: "{{ (kubeconfig_raw.stdout | from_json).users[0].user['client-certificate-data'] }}"
        client_key_b64: "{{ (kubeconfig_raw.stdout | from_json).users[0].user['client-key-data'] }}"

    - name: Configure local kubectl
      delegate_to: localhost
      block:
        - name: Create temp directory for certs
          tempfile:
            state: directory
          register: cert_dir
          changed_when: false

        - name: Write CA certificate
          copy:
            content: "{{ ca_cert_b64 | b64decode }}"
            dest: "{{ cert_dir.path }}/ca.crt"
          changed_when: false

        - name: Write client certificate
          copy:
            content: "{{ client_cert_b64 | b64decode }}"
            dest: "{{ cert_dir.path }}/client.crt"
          changed_when: false

        - name: Write client key
          copy:
            content: "{{ client_key_b64 | b64decode }}"
            dest: "{{ cert_dir.path }}/client.key"
            mode: "0600"
          changed_when: false

        - name: Set kubectl cluster
          command: >
            kubectl config set-cluster {{ cluster_name }}
            --server=https://{{ (gateway_firewall_k8s_open | bool) | ternary(gateway_ip, 'localhost') }}:6443
            --certificate-authority={{ cert_dir.path }}/ca.crt
            --embed-certs=true
          changed_when: true

        - name: Set kubectl credentials
          command: >
            kubectl config set-credentials {{ cluster_name }}
            --client-certificate={{ cert_dir.path }}/client.crt
            --client-key={{ cert_dir.path }}/client.key
            --embed-certs=true
          changed_when: true

        - name: Set kubectl context
          command: >
            kubectl config set-context {{ cluster_name }}
            --cluster={{ cluster_name }}
            --user={{ cluster_name }}
          changed_when: true

        - name: Use kubectl context
          command: kubectl config use-context {{ cluster_name }}
          changed_when: true

        - name: Cleanup temp certs
          file:
            path: "{{ cert_dir.path }}"
            state: absent
          changed_when: false

    - name: Verify cluster access
      kubernetes.core.k8s_info:
        kind: Node
      delegate_to: localhost
      changed_when: false
      when: gateway_firewall_k8s_open | bool

    - name: Print tunnel hint for private kube-api mode
      debug:
        msg:
          - "Kubeconfig was configured for https://localhost:6443 because gateway_firewall_k8s_open=false."
          - "Open a tunnel before using kubectl: ./ssh-node kubeapi"
      when: not (gateway_firewall_k8s_open | bool)
